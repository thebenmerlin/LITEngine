services:
  - type: web
    name: lit-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: KANOON_BASE_URL
        value: https://indiankanoon.org
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app
      - key: USE_FIXTURES
        value: "false"
      - key: PORT
        value: "10000"
      - key: ENV
        value: production
